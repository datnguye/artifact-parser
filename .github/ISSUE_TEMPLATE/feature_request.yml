name: Feature request
description: Suggest a new capability, artifact family, or schema version.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Got an idea? Great. Tell us the problem first — the best features start as a clearly
        described itch, not a pre-baked solution.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: The use case or pain point. What can't you do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. API sketches welcome.
    validations:
      required: false

  - type: dropdown
    id: kind
    attributes:
      label: What kind of request is this?
      options:
        - New schema version for an existing dbt artifact
        - New dbt artifact type
        - New plugin (a non-dbt artifact family)
        - Core framework improvement
        - Codegen / tooling improvement
        - Other
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed, or workarounds you're using now.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and this isn't a duplicate.
          required: true
        - label: I'd be willing to help implement this.
          required: false
